fullnameOverride: "taskmanager-postgresql-chart"

image:
  repository: postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

auth:
  database: taskdb
  existingSecret: "db-secret"

primary:
  # Number of PostgreSQL pods (StatefulSet replicas)
  replicaCount: 1

  persistence:
    enabled: true
    size: 20Gi
    storageClass: "longhorn-single"
    accessModes:
      - ReadWriteOnce
    # Number of Longhorn volume replicas (storage-level redundancy)
    # Keep at 1 since only node5 has sufficient disk space
    # Increase to 2 after freeing space on node4
    longhornReplicas: 1

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

service:
  type: ClusterIP
  port: 5432

# Soft anti-affinity: prefer spreading pods across nodes but don't hard-block
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - postgresql
          topologyKey: "kubernetes.io/hostname"