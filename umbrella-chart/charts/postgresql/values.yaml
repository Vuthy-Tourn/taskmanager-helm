fullnameOverride: "taskmanager-postgresql-chart"

image:
  repository: postgres
  tag: "16-alpine"
  pullPolicy: IfNotPresent

auth:
  database: taskdb
  existingSecret: "db-secret"

primary:
  persistence:
    enabled: true
    size: 20Gi
    storageClass: "longhorn"
    accessModes:
      - ReadWriteOnce
    # Keep at least 2 replicas to reduce risk of fault
    replicas: 2  

resources:
  requests:
    cpu: 250m   # Slightly higher to reduce scheduling conflicts
    memory: 512Mi
  limits:
    cpu: 500m
    memory: 1Gi

service:
  type: ClusterIP
  port: 5432

# Ensure pod is scheduled only on nodes where Longhorn is healthy
nodeSelector:
  longhorn.io/engine-manager: "true"

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - postgresql
        topologyKey: "kubernetes.io/hostname"