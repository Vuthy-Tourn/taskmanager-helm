replicaCount: 3

fullnameOverride: taskmanager-frontend-chart

image:
  repository: vuthytourn/taskmanager-frontend
  pullPolicy: IfNotPresent
  tag: "latest"

imagePullSecrets: []

service:
  type: ClusterIP
  port: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations: 
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    kubernetes.io/ingressClassName: "nginx"
  host: taskmanager-frontend.vuthytourn.shop
  tls:
    - secretName: taskmanager-tls
      hosts:
        - taskmanager-frontend.vuthytourn.shop

env:
  NEXT_PUBLIC_API_URL: "https://taskmanager-backend.vuthytourn.shop"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

livenessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 20
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 3000
  initialDelaySeconds: 10
  periodSeconds: 10
  failureThreshold: 3

nodeSelector: {}
tolerations: []
affinity: {}
